parameters:
- name: workingDirectory
  type: string
  default: terraform

- name: azureSubscription
  type: string

steps:
- task: AzureCLI@2
  displayName: Terraform Plan
  inputs:
    azureSubscription: ${{ parameters.azureSubscription }}
    scriptType: ps
    scriptLocation: inlineScript
    workingDirectory: ${{ parameters.workingDirectory }}
    inlineScript: |
      terraform plan