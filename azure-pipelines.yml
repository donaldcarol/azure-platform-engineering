# Starter pipeline

# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- none

pool:
  name: Default

steps:

- script: hostname
  displayName: Show Hostname

- script: whoami
  displayName: Show User

- script: |
    hostname
    whoami
    echo %COMPUTERNAME%
  displayName: System Info

- script: |
    dir C:\Users
  displayName: List Users



- script: echo Hello from CMD

- pwsh: |
    Write-Host "Hello from PowerShell"
    Get-Date
    
- task: AzurePowerShell@5
  inputs:
    azureSubscription: 'sc-azure-platform-lab'
    ScriptType: 'InlineScript'
    Inline: |
      Get-AzContext
      Get-AzResourceGroup
      Get-AzResourceGroup -Name rg-devops-lab
      Get-AzResource `
          -ResourceGroupName rg-devops-lab
      Get-AzVM
    azurePowerShellVersion: 'LatestVersion'
    
- task: AzureCLI@2
  inputs:
    azureSubscription: 'sc-azure-platform-lab'
    scriptType: pscore
    scriptLocation: inlineScript
    inlineScript: |
      Write-Host "Hello from AzureCLI PowerShell"