# Starter pipeline

# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- none

pool:
  name: Default

steps:

- script: hostname
  displayName: Show Hostname

- script: whoami
  displayName: Show User

- script: |
    hostname
    whoami
    echo %COMPUTERNAME%
  displayName: System Info

- script: |
    dir C:\Users
  displayName: List Users



- script: echo Hello from CMD

- pwsh: |
    Write-Host "Hello from PowerShell"
    Get-Date
    Get-Process

- powershell: |
    Get-Date
    Get-Process


- bash: |
    hostname
    whoami

    
- task: AzureCLI@2
  inputs:
    azureSubscription: 'sc-azure-platform-lab'
    scriptType: pscore
    scriptLocation: inlineScript
    inlineScript: |
      Write-Host "Hello from AzureCLI PowerShell"